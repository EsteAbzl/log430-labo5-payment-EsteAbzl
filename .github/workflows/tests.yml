name: test payment lab5

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 
        uses: actions/setup-python@v4 
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip 
          pip install -r requirements.txt 

      - name: Create .env 
        run: |
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_NAME=labo05_payments_db" >> .env
          echo "DB_USER=labo05" >> .env
          echo "DB_PASSWORD=labo05" >> .env

      - name: Build docker image
        run: docker compose build

      - name: Create docker network
        run: docker network create labo05-network 

      - name: Launch docker
        run: docker compose up -d 

      - name: Wait for the database to be up
        run: |
          for i in {1..30}; do
            docker compose exec -T mysql_payments mysql -h 127.0.0.1 -u labo05 -plabo05 -e "SELECT 1" --connect-timeout=10 && break
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done

      - name: Run tests
        working-directory: src 
        run: pytest -v --tb=short

      - name: Clear docker 
        run: docker compose down -v